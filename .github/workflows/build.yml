name: Android Precise ZIP Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract ZIP File
      run: |
        sudo apt-get install -y unzip
        unzip MovieBoxLocal.zip
        # Check files location for debugging
        ls -R

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Force Build Android APK
      run: |
        # Sub-folder ke andar ja kar permissions fix karein
        cd MovieBoxLocal
        chmod +x gradlew || true
        
        # Build command sub-folder ke andar hi chalayein
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MovieBox-Android-APK
        path: |
          MovieBoxLocal/app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
          
