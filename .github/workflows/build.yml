name: Android Static ZIP Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract ZIP File
      run: |
        sudo apt-get install -y unzip
        unzip MovieBoxLocal.zip

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Force Build Android APK
      run: |
        cd MovieBoxLocal
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MovieBox-Android-APK
        path: "MovieBoxLocal/app/build/outputs/apk/debug/app-debug.apk"
        
