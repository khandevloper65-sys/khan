name: Android Auto-Find Gradle Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract ZIP File
      run: |
        sudo apt-get install -y unzip
        unzip MovieBoxLocal.zip

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Force Build Android APK
      run: |
        # Sahi folder dhoondo jahan build.gradle baitha hai
        TARGET_DIR=$(find . -name "build.gradle" -not -path "*/app/*" -exec dirname {} \;)
        echo "Project folder found at: $TARGET_DIR"
        
        # Us folder ke andar jaao
        cd "$TARGET_DIR"
        
        # Bina gradlew wrapper ke system gradle se build karo
        gradle assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MovieBox-Android-APK
        path: |
          **/build/outputs/apk/debug/*.apk
          
