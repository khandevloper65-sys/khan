name: Android Smart ZIP Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract ZIP File
      run: |
        sudo apt-get install -y unzip
        
        # Kisi bhi .zip file ko dhoond kar extract karna
        ZIP_NAME=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
        if [ -z "$ZIP_NAME" ]; then
          echo "ERROR: Zip file nahi mili!"
          exit 1
        fi
        
        echo "Zip mili: $ZIP_NAME"
        unzip "$ZIP_NAME"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Change gradlew permissions
      run: |
        # Hum direct MovieBoxLocal folder ke andar ja rahe hain bina kisi confusion ke
        cd MovieBoxLocal
        chmod +x gradlew || true

    - name: Build APK with Gradle
      run: |
        cd MovieBoxLocal
        ./gradlew assembleDebug || gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MovieBox-Android-APK
        path: |
          MovieBoxLocal/app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Change gradlew permissions
      run: |
        cd ${{ env.PROJECT_PATH }}
        chmod +x gradlew || true

    - name: Build APK with Gradle
      run: |
        cd ${{ env.PROJECT_PATH }}
        ./gradlew assembleDebug || gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MovieBox-Android-APK
        path: |
          ${{ env.PROJECT_PATH }}/app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
          
